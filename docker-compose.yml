version: '3.8'

networks:
  prod:
    driver: bridge

services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - './nginx/nginx.conf:/etc/nginx/nginx.conf'
      - './ssl/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro'
      - './ssl/privkey.pem:/etc/ssl/private/privkey.pem:ro'
      - './frontend:/usr/share/nginx/html'
    restart: always
    networks:
      - prod

  frontend:
    build:
      context: ./frontend
    container_name: frontend_prod
    networks:
      - prod

  backend:
    build:
      context: ./backend
    container_name: backend_prod
    command: npm start
    restart: always
    networks:
      - prod

  db:
    image: postgres
    environment:
      POSTGRES_DB: stan
      POSTGRES_USER: login
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - prod

volumes:
  postgres_data:
