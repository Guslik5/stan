events {
    worker_connections  1024;
}

http {
    # 1. HTTP Server (Перенаправление)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
     
    server {
        listen 80;
        server_name www.stanorg.ru stanorg.ru;

        # Перенаправляем весь HTTP трафик на HTTPS
        return 301 https://$host$request_uri;
    }

    # 2. HTTPS Server (Основной)
    server {
        listen 443 ssl;
        server_name www.stanorg.ru stanorg.ru;

        # --- Настройки SSL ---
        ssl_certificate     /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;

        # Рекомендуемые настройки безопасности SSL
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # Настройки протоколов и шифров (для A+ рейтинга)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # Включаем HSTS (HTTP Strict Transport Security)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # ---------------------

        # Обслуживание фронтенда (SPA)
	location / {
            root /usr/share/nginx/html;
            index index.html;
	    try_files $uri $uri/ /index.html;
        }

        location /stan {
            proxy_pass http://backend:1337;  # Здесь 'backend' - это имя сервиса из docker-compose.yml
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
